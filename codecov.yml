# Codecov configuration for Pocket TTS iOS
# https://docs.codecov.com/docs/codecovyml-reference

codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "60...100"

  status:
    project:
      default:
        target: 70%
        threshold: 5%
        informational: false
        only_pulls: false

    patch:
      default:
        target: 70%
        threshold: 10%
        informational: true

flags:
  rust:
    paths:
      - src/
    carryforward: true

ignore:
  - "src/bin/**"           # CLI binaries
  - "**/*_tests.rs"        # Test files
  - "src/modules/tests.rs" # Test module
  - "target/**"            # Build artifacts
  - "validation/**"        # Python validation scripts

comment:
  layout: "header, diff, flags, components"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

parsers:
  gcov:
    branch_detection:
      conditional: true
      loop: true
      method: false
      macro: false
